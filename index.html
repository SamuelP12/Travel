<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Travel</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Screen 1: Home / Browse -->
    <div class="screen active" id="screen-home">
        <div class="status-bar"></div>
        <div class="home-header">
            <h1 class="app-title">Travel</h1>
            <p class="app-subtitle">Your Personal Audio Tour Guide <span style="opacity:.5;font-size:.8em">· build 6</span></p>
            <div class="search-row">
                <div class="search-bar">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search a destination..." autocomplete="off">
                </div>
                <button class="btn-locate" id="btn-locate" title="Find nearest tour">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                    </svg>
                </button>
            </div>
        </div>
        <div class="home-content">
            <h2 class="section-title">Popular Tours</h2>
            <div class="tour-list" id="tour-list">
                <!-- Tours injected by JS -->
            </div>
        </div>
    </div>

    <!-- Screen: Map -->
    <div class="screen" id="screen-map">
        <div id="map"></div>
        <button class="map-back-btn" id="btn-back-map">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button class="map-gps-btn" id="btn-map-gps" title="Find my location">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 2v4"></path>
                <path d="M12 18v4"></path>
                <path d="M2 12h4"></path>
                <path d="M18 12h4"></path>
            </svg>
        </button>
    </div>

    <!-- Screen 2: Tour Detail -->
    <div class="screen" id="screen-tour">
        <div class="tour-hero" id="tour-hero">
            <button class="btn-back" id="btn-back-tour">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="tour-hero-overlay">
                <h1 class="tour-hero-title" id="tour-title"></h1>
                <p class="tour-hero-region" id="tour-region"></p>
            </div>
        </div>
        <div class="tour-body">
            <p class="tour-description" id="tour-description"></p>
            <div class="tour-stats">
                <div class="stat">
                    <span class="stat-value" id="tour-stops">0</span>
                    <span class="stat-label">Stops</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="tour-duration">0 min</span>
                    <span class="stat-label">Audio</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="tour-distance">0 mi</span>
                    <span class="stat-label">Distance</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="tour-drive-time">0 min</span>
                    <span class="stat-label">Drive</span>
                </div>
            </div>
            <button class="btn-primary" id="btn-get-tour">Get Tour — Free</button>
            <h3 class="locations-heading">Locations</h3>
            <div class="location-preview-list" id="tour-locations-preview">
                <!-- Location previews injected by JS -->
            </div>
        </div>
    </div>

    <!-- Screen 3: Locations List (after "purchase") -->
    <div class="screen" id="screen-locations">
        <div class="status-bar"></div>
        <div class="locations-header">
            <button class="btn-back" id="btn-back-locations">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 class="locations-title" id="locations-title"></h2>
        </div>
        <div class="locations-list" id="locations-list">
            <!-- Locations injected by JS -->
        </div>
    </div>

    <!-- Screen 4: Audio Player -->
    <div class="screen" id="screen-player">
        <div class="player-top-bar">
            <button class="btn-close" id="btn-close-player">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <span class="player-label">Now Playing</span>
            <div class="btn-placeholder"></div>
        </div>
        <div class="player-content">
            <div class="player-image" id="player-image">
                <img src="" alt="" id="player-img">
            </div>
            <h2 class="player-title" id="player-title"></h2>
            <p class="player-subtitle" id="player-subtitle"></p>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-times">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>
            <div class="player-controls">
                <button class="btn-control" id="btn-prev" title="Previous">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="btn-control btn-skip" id="btn-back-10" title="Back 10s">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 4v6h6"></path>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                    <span class="skip-label">10</span>
                </button>
                <button class="btn-control btn-play" id="btn-play" title="Play / Pause">
                    <svg class="icon-play" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="icon-pause hidden" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
                    </svg>
                </button>
                <button class="btn-control btn-skip" id="btn-forward-10" title="Forward 10s">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    <span class="skip-label">10</span>
                </button>
                <button class="btn-control" id="btn-skip" title="Skip">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Wipe any old service worker + cache from a previous build, then
        // reload once so the new code actually takes effect. sessionStorage
        // flag prevents an infinite reload loop.
        (function() {
            if (sessionStorage.getItem('travel-cache-wiped')) return;

            var tasks = [];
            if ('serviceWorker' in navigator) {
                tasks.push(
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        if (regs.length === 0) return false;
                        return Promise.all(regs.map(function(r) { return r.unregister(); }))
                            .then(function() { return true; });
                    })
                );
            }
            if ('caches' in window) {
                tasks.push(
                    caches.keys().then(function(keys) {
                        if (keys.length === 0) return false;
                        return Promise.all(keys.map(function(k) { return caches.delete(k); }))
                            .then(function() { return true; });
                    })
                );
            }
            if (tasks.length === 0) return;

            Promise.all(tasks).then(function(results) {
                if (results.some(function(r) { return r === true; })) {
                    sessionStorage.setItem('travel-cache-wiped', '1');
                    // Use a fresh URL to also bypass Safari's HTTP cache
                    location.replace(location.pathname + '?_=' + Date.now());
                }
            });
        })();
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.v3.js?v=6"></script>
</body>
</html>
